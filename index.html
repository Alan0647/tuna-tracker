<!DOCTYPE html>
<html>
<head>
    <title>鮪魚全球漁場環境推估系統 2.0 版</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'SF Pro Display', sans-serif; height: 100vh; display: flex; flex-direction: column; }
        #map { flex: 1; height: calc(100vh - 56px); } /* 主地圖 */
        .sidebar { width: 320px; height: 100vh; position: absolute; top: 56px; left: 0; z-index: 1000; background: rgba(255, 255, 255, 0.95); box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1); padding: 20px; overflow-y: auto; }
        .map-title { font-size: 1.25rem; font-weight: bold; margin-bottom: 20px; }
        .controls-section { margin-bottom: 30px; }
        .env-forecast-card { border: 1px dashed #d1e7dd; background-color: #f8fff9; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">TunaEnvironmental Tracker v2.0</span>
        </div>
    </nav>

    <div class="sidebar">
        <div class="map-title">全太平洋黑鮪漁場分佈預估</div>
        
        <div class="controls-section">
            <label class="form-label">選擇月份: <span id="monthDisplay" class="fw-bold">3</span>月</label>
            <input type="range" class="form-range" id="monthSlider" min="1" max="12" value="3">
        </div>

        <div class="controls-section">
            <label class="form-label">選擇魚種:</label>
            <div id="speciesList" class="list-group">
                </div>
        </div>

        <div class="controls-section env-forecast-card card p-3">
            <h6 class="card-title text-success">科學推估模式 (SEAPODYM / Copernicus)</h6>
            <div class="form-check form-switch mt-2">
                <input class="form-check-input" type="switch" id="envForecastSwitch">
                <label class="form-check-input-label" for="envForecastSwitch">開啟環境模型推估</label>
            </div>
            <select class="form-select form-select-sm mt-2" id="envFactorSelect" disabled>
                <option value="SST_FRONTS">溫度鋒面 (SST Fronts)</option>
                <option value="CHL_NPTZ">葉綠素 NPTZ 過渡帶</option>
            </select>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://leaflet.github.io/Leaflet.heat/dist/leaflet-heat.js"></script>
    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
