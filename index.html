<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>海洋前哨 3.1 | 昱友企業漁情監測</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --dark-bg: #0b0e14; --panel-bg: #161b22; --text: #c9d1d9; }
        body { background: var(--dark-bg); color: var(--text); font-family: sans-serif; margin: 0; }
        #map { height: 100vh; width: 100%; z-index: 1; }
        .dashboard-panel { position: absolute; top: 15px; left: 15px; z-index: 1000; width: 340px; 
                          background: var(--panel-bg); border: 1px solid #30363d; border-radius: 12px; 
                          padding: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); max-height: 90vh; overflow-y: auto; }
        .layer-card { background: #0d1117; border-radius: 8px; padding: 12px; margin-top: 12px; border: 1px solid #21262d; }
        .legend-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        h6 { font-size: 0.75rem; letter-spacing: 1px; color: #8b949e !important; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="dashboard-panel">
        <h5 class="text-white border-bottom pb-2 mb-3">Oceanic Sentinel 3.1</h5>
        
        <div class="mb-4">
            <label class="form-label small">預估月份：<span id="monthVal" class="text-info fw-bold">3</span>月</label>
            <input type="range" class="form-range" id="monthSlider" min="1" max="12" value="3">
        </div>

        <div class="layer-card">
            <h6>報告漁場分佈 (歷史熱點)</h6>
            <div id="speciesToggles">
                <p class="small text-muted">正在載入數據...</p>
            </div>
        </div>

        <div class="layer-card">
            <h6 class="text-primary">即時衛星環境層 (OPEN DATA)</h6>
            <div class="form-check form-switch small mb-2">
                <input class="form-check-input" type="checkbox" id="sstWms">
                <label class="form-check-label">海表溫度 (NOAA SST)</label>
            </div>
            <div class="form-check form-switch small">
                <input class="form-check-input" type="checkbox" id="chlWms">
                <label class="form-check-label">葉綠素濃度 (NASA GIBS)</label>
            </div>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
